server.port=0
spring.datasource.url=jdbc:h2:mem:${random.uuid};DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password= secret
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.repair-on-migrate=true
spring.security.enabled=true
spring.main.allow-bean-definition-overriding=true
atw.initializer.enabled=true
drama.events.scheduler.enabled=false
atw.tutorial.redirect.enabled=false
vaadin.devmode.copilot.enabled=false
logging.level.com.github.javydreamercsw=INFO
logging.level.org.springframework.security=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.apache.catalina.connector.ClientAbortException=ERROR
