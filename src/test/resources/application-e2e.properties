spring.vaadin.enabled=true
vaadin.url-mapping=/*
spring.vaadin.url-mapping=/*
vaadin.servlet.url-mapping=/*
vaadin.urlMapping=/*
# Disable Vaadin's automatic security configuration to avoid servlet mapping issues in E2E
vaadin.security.configurer.enabled=false
# Explicitly exclude Vaadin's security auto-configuration which triggers the problematic configurer
spring.autoconfigure.exclude=com.vaadin.flow.spring.SpringSecurityAutoConfiguration
spring.datasource.url=jdbc:h2:mem:${random.uuid};DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password= secret
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.repair-on-migrate=true
spring.security.enabled=true
spring.main.allow-bean-definition-overriding=true
atw.initializer.enabled=true
drama.events.scheduler.enabled=false
logging.level.com.github.javydreamercsw=INFO
# Include test profile to get common test settings, but our security config will override
# Moved to @ActiveProfiles in AbstractE2ETest.java to comply with Spring Boot rules

