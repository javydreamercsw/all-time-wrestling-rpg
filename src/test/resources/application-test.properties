logging.file.name=atwrpg.log
logging.level.root=INFO
server.servlet.context-path=/atw-rpg
vaadin.react.enable=false
spring.vaadin.enabled=false
data.initializer.enabled=true
drama.events.scheduler.enabled=false
logging.level.com.github.javydreamercsw=INFO
notion.sync.enabled=true
notion.sync.scheduler.enabled=false
spring.flyway.locations=classpath:db/migration/h2
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.repair-on-migrate=true
spring.jpa.hibernate.ddl-auto=none
spring.main.allow-bean-definition-overriding=true
spring.datasource.url=jdbc:h2:mem:testdb_${random.uuid};DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;LOCK_TIMEOUT=10000
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
data.initializer.skip-if-not-empty=true
# Disable security observations to avoid interference with runAs/test context
management.observations.security.enabled=false
