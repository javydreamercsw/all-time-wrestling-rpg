server.port=${PORT:8080}
logging.level.org.atmosphere=warn
logging.level.com.github.javydreamercsw=INFO

# To improve the performance during development.
# For more information https://vaadin.com/docs/latest/flow/integrations/spring/configuration#special-configuration-parameters
vaadin.allowed-packages=com.vaadin,org.vaadin,com.flowingcode,com.github.javydreamercsw

spring.main.allow-circular-references = true
spring.flyway.depends-on = entityManagerFactory

# Open-in-view is only needed if you use lazy-loaded entities in your Flow views.
spring.jpa.open-in-view=false

# Initialize the JPA Entity Manager before considering data.sql so that the EM can create the schema and data.sql contain data
spring.jpa.defer-datasource-initialization=false


spring.jpa.hibernate.ddl-auto=none
spring.h2.console.enabled=false

# HikariCP Connection Pool Optimization
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA Performance Optimization
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# Flyway Configuration - disabled for now to avoid circular dependency
spring.flyway.enabled=true
# Allow out-of-order migrations (needed when prerequisite migrations are added after later ones shipped)
spring.flyway.out-of-order=true

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.show-actuator=true
springdoc.group-configs[0].group=public-api
springdoc.group-configs[0].paths-to-match=/api/**
springdoc.group-configs[0].packages-to-scan=com.github.javydreamercsw.management.controller,com.github.javydreamercsw.base.ai
management.endpoints.web.exposure.include=health
server.servlet.context-path=/
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.forward-headers-strategy=native