spring.profiles.active=h2
spring.jpa.hibernate.ddl-auto=none
spring.h2.console.enabled=true
spring.flyway.locations=classpath:db/migration/h2

logging.level.com.github.javydreamercsw=INFO
server.servlet.context-path=/atw-rpg
vaadin.react.enable=false
drama.events.scheduler.enabled=true
server.forward-headers-strategy=framework
server.connection-timeout=300000
server.servlet.session.timeout=30m

# Image Storage
image.storage.directory=src/main/resources/META-INF/resources/images/generated

# Drama event scheduler frequency in milliseconds (default: 7 days)
drama.events.scheduler.rate=604800000

# Minimum in-game days between guaranteed drama event checks (default: 7)
drama.events.scheduler.threshold.days=7

# Drama event retention cleanup (opt-in; set enabled=true to activate)
drama.events.cleanup.enabled=false
drama.events.retention.processed.days=90
drama.events.retention.unprocessed.days=180

# Security — remember-me token. Override via env-var SECURITY_REMEMBER_ME_KEY in production.
security.remember-me.key=atwrpg-remember-me-key
security.remember-me.token-validity-seconds=604800
