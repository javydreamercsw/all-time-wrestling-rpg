# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information, see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches:
      - 'main'
      - 'release/**'
    tags:
      - 'v*.*.*'

  pull_request:
    branches:
      - '**'

permissions:
  contents: read
  actions: read
  security-events: write

# Prevent duplicate runs when a push to release/** also syncs an open PR.
# Each PR gets its own concurrency slot (keyed by PR number); direct pushes to
# main/tags get their own slot (keyed by ref). New pushes cancel in-progress runs
# within the same slot, so back-to-back commits to the same branch don't pile up.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-paths:
    runs-on: ubuntu-latest
    # Skip the test pipeline for direct pushes to release/** branches — a PR event
    # for the release→main PR already runs the full suite on the same commit. The
    # docker-image-release-branch job (below) is not gated on check-paths, so it
    # still fires on every push to release/** regardless of this condition.
    if: >-
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/')
    outputs:
      code_changed: ${{ steps.filter.outputs.code_changed }}
      notion_changed: ${{ steps.filter.outputs.notion_changed }}
      mysql_migration_changed: ${{ steps.filter.outputs.mysql_migration_changed }}
      ui_changed: ${{ steps.filter.outputs.ui_changed }}
      service_changed: ${{ steps.filter.outputs.service_changed }}
      db_changed: ${{ steps.filter.outputs.db_changed }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code_changed:
              - 'src/**'
              - '!src/main/resources/META-INF/resources/docs/**'
              - 'pom.xml'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'vite.config.ts'
              - 'scripts/sync-vaadin-overrides.cjs'
              - '.github/workflows/**'
              - '!docs/**'
            notion_changed:
              - 'src/main/java/com/github/javydreamercsw/management/service/sync/**'
            mysql_migration_changed:
              - 'src/main/resources/db/migration/mysql/**'
            # UI/frontend changes — gates E2E jobs (Chrome + Spring Boot startup are expensive)
            ui_changed:
              - 'src/main/java/**/ui/**'
              - 'src/main/java/**/view/**'
              - 'src/frontend/**'
              - 'src/main/resources/META-INF/resources/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'vite.config.ts'
            # Backend service/domain/API changes — gates integration tests
            service_changed:
              - 'src/main/java/**/service/**'
              - 'src/main/java/**/repository/**'
              - 'src/main/java/**/domain/**'
              - 'src/main/java/**/rest/**'
              - 'src/main/java/**/controller/**'
            # DB migration changes — also gates integration tests
            db_changed:
              - 'src/main/resources/db/**'

  rewrite-check:
    needs: check-paths
    if: needs.check-paths.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: OpenRewrite dry-run (fail if changes needed)
        run: mvn -B rewrite:dryRun

  build-and-unit-test:
    needs: [check-paths, rewrite-check]
    if: needs.check-paths.outputs.code_changed == 'true'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Run unit tests with coverage
      run: mvn -B test -Pcoverage -DnvdApiKey=${{ secrets.NVD_API }}

    - name: Verify WAR packaging
      run: mvn -B package -Pwar -DskipTests

    - name: Upload unit test coverage data
      uses: actions/upload-artifact@v7
      with:
        name: jacoco-exec
        path: target/jacoco.exec

  integration-tests:
    runs-on: ubuntu-latest
    needs: [check-paths, build-and-unit-test]
    if: needs.check-paths.outputs.service_changed == 'true' || needs.check-paths.outputs.db_changed == 'true'
    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Run Integration Tests
      run: |
        # If a committed MySQL snapshot exists for the current .released version,
        # pass it to FlywayMigrationIT so the prod-dump upgrade path is also tested.
        # The snapshot is generated by GenerateMysqlSnapshotIT during the release workflow
        # and committed to src/test/resources/db/. On the first run before the initial
        # snapshot is committed, this step gracefully falls back to the fresh-schema test only.
        RELEASED=$(cat src/main/resources/db/migration/mysql/.released | tr -d '[:space:]')
        VERSION=$(echo "$RELEASED" | sed 's/[^0-9]//g')
        SNAPSHOT="src/test/resources/db/mysql-snapshot-v${VERSION}.sql"
        if [ -f "$SNAPSHOT" ]; then
          echo "MySQL snapshot found: $SNAPSHOT — enabling prod-dump migration test"
          mvn -B verify -Pintegration-test,coverage -Dsurefire.skip=true "-Dprod.dump.file=${SNAPSHOT}"
        else
          echo "MySQL snapshot not yet committed (expected: $SNAPSHOT) — running fresh-schema test only"
          mvn -B verify -Pintegration-test,coverage -Dsurefire.skip=true
        fi

    - name: Upload integration test coverage data
      uses: actions/upload-artifact@v7
      with:
        name: jacoco-it-exec
        path: target/jacoco-it.exec

  notion-integration-tests:
    runs-on: ubuntu-latest
    needs: [build-and-unit-test, check-paths]
    if: needs.check-paths.outputs.notion_changed == 'true'
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Run Notion Integration Tests
      run: mvn -B verify -Pnotion-it,coverage -Dsurefire.skip=true -Dnotion.live.tests.enabled=true

    - name: Upload notion integration test coverage data
      uses: actions/upload-artifact@v7
      with:
        name: jacoco-notion-it-exec
        path: target/jacoco-notion-it.exec
        if-no-files-found: ignore

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [check-paths, build-and-unit-test]
    if: needs.check-paths.outputs.ui_changed == 'true' && github.event_name == 'pull_request'
    env:
      HEADLESS: 'true'
      GITHUB_ACTIONS: 'true'
    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Set up Chrome
      uses: browser-actions/setup-chrome@v2
    - name: Build frontend bundle
      run: mvn -B package -Pproduction -DskipTests
    - name: Run E2E Tests
      run: mvn -B verify -Pe2e,coverage,production -Dsurefire.skip=true
    - name: Upload E2E test failure artifacts
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: e2e-test-failures
        path: target/test-failures
    - name: Upload E2E test coverage data
      uses: actions/upload-artifact@v7
      with:
        name: jacoco-e2e-exec
        path: target/jacoco-e2e.exec
        if-no-files-found: ignore
  
  docs-e2e-tests:
    runs-on: ubuntu-latest
    needs: [check-paths, build-and-unit-test]
    if: needs.check-paths.outputs.ui_changed == 'true' && github.event_name == 'pull_request'
    env:
      HEADLESS: 'true'
      GITHUB_ACTIONS: 'true'
    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Set up Chrome
      uses: browser-actions/setup-chrome@v2
    - name: Build frontend bundle
      run: mvn -B package -Pproduction -DskipTests
    - name: Run Docs E2E Tests
      run: mvn -B verify -Pdocs-e2e,coverage,production -Dsurefire.skip=true
    - name: Upload Docs E2E test failure artifacts
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: docs-e2e-test-failures
        path: target/test-failures
    - name: Upload Docs E2E test coverage data
      uses: actions/upload-artifact@v7
      with:
        name: jacoco-docs-e2e-exec
        path: target/jacoco-docs-e2e.exec
        if-no-files-found: ignore

  validate-video-tests:
    runs-on: ubuntu-latest
    needs: [check-paths, build-and-unit-test]
    if: needs.check-paths.outputs.ui_changed == 'true' && github.event_name == 'pull_request'
    env:
      HEADLESS: 'true'
      GITHUB_ACTIONS: 'true'
    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Set up Chrome
      uses: browser-actions/setup-chrome@v2
    - name: Build frontend bundle
      run: mvn -B package -Pproduction -DskipTests
    - name: Validate video tests (dry run — no artifacts generated)
      run: mvn -B verify -Pvalidate-videos,production -Dsurefire.skip=true -Dheadless=true
    - name: Upload video test failure artifacts
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: validate-video-test-failures
        path: target/test-failures

  notion-e2e-tests:
    runs-on: ubuntu-latest
    needs: [build-and-unit-test, check-paths]
    if: needs.check-paths.outputs.notion_changed == 'true' && github.event_name == 'pull_request'
    env:
      HEADLESS: 'true'
      GITHUB_ACTIONS: 'true'
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Set up Chrome
      uses: browser-actions/setup-chrome@v2
    - name: Build frontend bundle
      run: mvn -B package -Pproduction -DskipTests
    - name: Run Notion E2E Tests
      run: mvn -B verify -Pnotion-e2e,coverage,production -Dsurefire.skip=true
    - name: Upload Notion E2E test failure artifacts
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: notion-e2e-test-failures
        path: target/test-failures
    - name: Upload Notion E2E test coverage data
      uses: actions/upload-artifact@v7
      with:
        name: jacoco-notion-e2e-exec
        path: target/jacoco-notion-e2e.exec
        if-no-files-found: ignore

  coverage-and-analysis:
    runs-on: ubuntu-latest
    needs: [check-paths, build-and-unit-test, integration-tests, e2e-tests, docs-e2e-tests, validate-video-tests, notion-integration-tests, notion-e2e-tests]
    if: >-
      always() &&
      needs.check-paths.outputs.code_changed == 'true' &&
      needs.build-and-unit-test.result == 'success' &&
      (needs.integration-tests.result == 'success' || needs.integration-tests.result == 'skipped') &&
      (needs.e2e-tests.result == 'success' || needs.e2e-tests.result == 'skipped') &&
      (needs.docs-e2e-tests.result == 'success' || needs.docs-e2e-tests.result == 'skipped') &&
      (needs.validate-video-tests.result == 'success' || needs.validate-video-tests.result == 'skipped') &&
      (needs.notion-e2e-tests.result == 'success' || needs.notion-e2e-tests.result == 'skipped')
    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Download unit test coverage data
      uses: actions/download-artifact@v8
      with:
        name: jacoco-exec
        path: target/

    - name: Download integration test coverage data
      if: needs.integration-tests.result == 'success'
      uses: actions/download-artifact@v8
      with:
        name: jacoco-it-exec
        path: target/

    - name: Download E2E test coverage data
      if: needs.e2e-tests.result == 'success'
      uses: actions/download-artifact@v8
      with:
        name: jacoco-e2e-exec
        path: target/

    - name: Download Docs E2E test coverage data
      continue-on-error: true
      uses: actions/download-artifact@v8
      with:
        name: jacoco-docs-e2e-exec
        path: target/

    - name: Download Notion integration test coverage data
      if: needs.check-paths.outputs.notion_changed == 'true'
      continue-on-error: true
      uses: actions/download-artifact@v8
      with:
        name: jacoco-notion-it-exec
        path: target/

    - name: Download Notion E2E test coverage data
      if: needs.check-paths.outputs.notion_changed == 'true'
      continue-on-error: true
      uses: actions/download-artifact@v8
      with:
        name: jacoco-notion-e2e-exec
        path: target/

    - name: Ensure classes are compiled
      run: mvn -B compile -Pcoverage

    - name: Merge coverage data
      run: mvn -B jacoco:merge -Pcoverage

    - name: Generate merged coverage report
      run: mvn -B jacoco:report -Pcoverage -Djacoco.dataFile=target/jacoco-merged.exec -Djacoco.outputDirectory=target/site/jacoco-merged

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v6
      with:
        file: ./target/site/jacoco-merged/jacoco.xml
        flags: merged
        name: codecov-umbrella
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}

  # Build and push Docker image (no release profile) on release/* branches
  docker-image-release-branch:
    if: startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image (no release profile)
        run: mvn clean package jib:build -Pproduction -DskipTests=true

  # Build and push Docker image with release profile on version tag
  docker-image-main-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image (release profile)
        run: mvn clean package jib:build -Prelease,production -DskipTests=true

  docker-it:
    runs-on: ubuntu-latest
    needs: [check-paths, build-and-unit-test]
    if: needs.check-paths.outputs.service_changed == 'true' || needs.check-paths.outputs.db_changed == 'true' || needs.check-paths.outputs.ui_changed == 'true'
    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
    - name: Cache Docker base image
      id: docker-cache
      uses: actions/cache@v5
      with:
        path: /tmp/docker-images
        key: docker-tomcat-11-jdk25-${{ hashFiles('Dockerfile') }}
        restore-keys: docker-tomcat-11-jdk25-
    - name: Load or pull Docker base image
      run: |
        if [ -f /tmp/docker-images/tomcat-11-jdk25.tar ]; then
          docker load < /tmp/docker-images/tomcat-11-jdk25.tar
        else
          docker pull tomcat:11-jdk25
          mkdir -p /tmp/docker-images
          docker save tomcat:11-jdk25 > /tmp/docker-images/tomcat-11-jdk25.tar
        fi
    - name: Build WAR for Docker image
      run: mvn -B package -Pwar,production -DskipTests
    - name: Run Docker Integration Tests
      run: mvn -B verify -Pdocker-it -Dsurefire.skip=true
