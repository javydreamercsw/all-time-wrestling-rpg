name: Redeploy Docs

# Rebuilds and redeploys the GitHub Pages docs site from an existing
# docs-videos artifact without re-running any E2E or screenshot tests.
# Screenshots are committed to the repo; only videos need to be supplied
# from a prior release run.
#
# Usage:
#   1. Find the release workflow run ID that produced the docs-videos artifact
#      (Actions tab → Create Release → copy the run ID from the URL).
#   2. Trigger this workflow with the ref and run ID.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to check out (e.g. release/2.0.0)'
        required: true
        default: 'main'
      videos_run_id:
        description: 'Release workflow run ID whose docs-videos artifact to use (leave blank to skip videos)'
        required: false
        default: ''

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Install docs site dependencies
        run: npm ci
        working-directory: docs/site

      - name: Download docs-videos artifact from release run
        if: ${{ github.event.inputs.videos_run_id != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Download to a temp dir to avoid conflicts with any existing files
          # in the workspace (e.g. git-committed videos/).
          gh run download ${{ github.event.inputs.videos_run_id }} \
            --name docs-videos \
            --dir /tmp/videos-artifact

      - name: Normalize video artifact structure
        if: ${{ github.event.inputs.videos_run_id != '' }}
        run: |
          mkdir -p docs/videos
          # Artifact structure varies by when the release ran:
          #   pre-fix:  /tmp/videos-artifact/videos/<file>.mp4  (trailing-slash upload stripped docs/)
          #   post-fix: /tmp/videos-artifact/docs/videos/<file>.mp4
          # Also copy video-manifest.json to docs/ if present.
          shopt -s nullglob
          if ls /tmp/videos-artifact/docs/videos/*.mp4 &>/dev/null; then
            echo "Post-fix artifact: copying from docs/videos/"
            cp /tmp/videos-artifact/docs/videos/*.mp4 docs/videos/
            [ -f /tmp/videos-artifact/docs/video-manifest.json ] && cp /tmp/videos-artifact/docs/video-manifest.json docs/
          elif ls /tmp/videos-artifact/videos/*.mp4 &>/dev/null; then
            echo "Pre-fix artifact: copying from videos/"
            cp /tmp/videos-artifact/videos/*.mp4 docs/videos/
            [ -f /tmp/videos-artifact/video-manifest.json ] && cp /tmp/videos-artifact/video-manifest.json docs/
          else
            echo "No MP4s found in artifact — deploying without videos"
          fi
          echo "Videos in docs/videos/: $(ls docs/videos/*.mp4 2>/dev/null | wc -l)"

      - name: Generate Markdown and build embedded docs
        run: node scripts/generate-docs.cjs
        env:
          GITHUB_PAGES_BASE: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

      - name: Build documentation for GitHub Pages
        run: npm run docs:build
        working-directory: docs/site
        env:
          BASE_URL: /${{ github.event.repository.name }}/

      - name: Create .nojekyll
        run: touch docs/site/.vitepress/dist/.nojekyll

      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/site/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
