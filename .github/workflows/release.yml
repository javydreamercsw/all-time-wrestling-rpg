name: Create Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MAVEN_OPTS: "-Xmx6g -XX:+UseG1GC"
  JAVA_TOOL_OPTIONS: "-Xmx6g"

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'The release version (e.g., 1.2.0)'
        required: true

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # 0. PREFLIGHT — verify the source branch tip has all checks passing before
  #    we invest any CI time in the release pipeline.
  # ---------------------------------------------------------------------------
  preflight_checks:
    runs-on: ubuntu-latest
    steps:
      - name: Verify all checks pass on source branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh api "repos/${{ github.repository }}/commits/${{ github.ref_name }}" \
                --jq '.sha')
          echo "Checking CI status for SHA $SHA on branch ${{ github.ref_name }}"

          # Collect all check runs for the SHA
          RESULTS=$(gh api "repos/${{ github.repository }}/commits/${SHA}/check-runs" \
                    --paginate --jq '
                      .check_runs[]
                      | select(.name != "${{ github.workflow }}" and .name != "preflight_checks")
                      | {name: .name, status: .status, conclusion: .conclusion}')

          echo "$RESULTS"

          # Fail if any check is still in progress
          IN_PROGRESS=$(echo "$RESULTS" | jq -r 'select(.status != "completed") | .name')
          if [ -n "$IN_PROGRESS" ]; then
            echo "::error::The following checks are not yet complete:"
            echo "$IN_PROGRESS"
            exit 1
          fi

          # Fail if any completed check did not succeed
          FAILED=$(echo "$RESULTS" | jq -r 'select(.conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral") | "\(.name): \(.conclusion)"')
          if [ -n "$FAILED" ]; then
            echo "::error::The following checks did not pass:"
            echo "$FAILED"
            exit 1
          fi

          echo "All checks passed — proceeding with release."

  # ---------------------------------------------------------------------------
  # 1. SETUP — version bump, migration metadata, snapshots, changelog.
  #    Ends with a git push so downstream jobs check out a branch that already
  #    has the versioned source.  No screenshots or videos here — those run in
  #    parallel in the next stage.
  # ---------------------------------------------------------------------------
  setup_release:
    needs: preflight_checks
    runs-on: ubuntu-latest
    outputs:
      is_patch: ${{ steps.release_type.outputs.is_patch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect release type
        id: release_type
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BASE=$(echo "$VERSION" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          PATCH=$(echo "$BASE" | cut -d. -f3)
          if [ "$PATCH" -ne "0" ]; then
            echo "is_patch=true" >> "$GITHUB_OUTPUT"
            echo "Patch release detected ($VERSION) — screenshots and videos will be skipped."
          else
            echo "is_patch=false" >> "$GITHUB_OUTPUT"
            echo "Non-patch release detected ($VERSION) — screenshots and videos will be generated."
          fi

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create or switch to release branch
        run: |
          if git ls-remote --exit-code --heads origin "refs/heads/release/${{ github.event.inputs.version }}"; then
            echo "Branch release/${{ github.event.inputs.version }} exists, checking it out."
            git checkout "release/${{ github.event.inputs.version }}"
          else
            echo "Branch release/${{ github.event.inputs.version }} does not exist, creating it from the current branch."
            git checkout -b "release/${{ github.event.inputs.version }}"
            # Push immediately so the branch exists on GitHub before the changelog
            # generator queries it via the API (it 404s on a branch that only exists locally).
            git push -u origin "release/${{ github.event.inputs.version }}"
          fi

      - name: Update POM version
        run: mvn versions:set -DnewVersion=${{ github.event.inputs.version }} -DgenerateBackupPoms=false

      - name: Update migration metadata
        run: |
          LATEST_H2=$(ls src/main/resources/db/migration/h2/V*__*.sql | grep -o 'V[0-9]*' | sort -V | tail -n 1)
          LATEST_MYSQL=$(ls src/main/resources/db/migration/mysql/V*__*.sql | grep -o 'V[0-9]*' | sort -V | tail -n 1)
          echo "$LATEST_H2" > src/main/resources/db/migration/h2/.released
          echo "$LATEST_MYSQL" > src/main/resources/db/migration/mysql/.released

      - name: Generate migration checksums
        run: bash scripts/generate-migration-checksums.sh

      - name: Generate H2 reference snapshot
        run: mvn -Pintegration-test verify -Dgenerate.h2.snapshot=true -Dit.test=GenerateH2SnapshotIT -Dsurefire.skip=true -DfailIfNoTests=false -Dspotless.check.skip=true

      - name: Generate MySQL reference snapshot
        run: mvn -Pintegration-test verify -Dgenerate.mysql.snapshot=true -Dit.test=GenerateMysqlSnapshotIT -Dsurefire.skip=true -DfailIfNoTests=false -Dspotless.check.skip=true

      - name: Install root and docs dependencies
        run: |
          npm install --legacy-peer-deps
          cd docs/site && npm install

      - name: Install changelog generator
        run: gem install github_changelog_generator

      - name: Generate Changelog
        run: |
          github_changelog_generator \
            --user javydreamercsw \
            --project all-time-wrestling-rpg \
            --token ${{ secrets.GITHUB_TOKEN }} \
            --output CHANGELOG.md \
            --release-branch release/${{ github.event.inputs.version }} \
            --future-release v${{ github.event.inputs.version }}

          # Extract only the current release section for the GitHub release body.
          awk '/^## \[/{count++; if(count==2) exit} count==1{print}' CHANGELOG.md \
            > RELEASE_NOTES.md

      - name: Format and Push initial changes
        run: |
          mvn spotless:apply
          git add .
          if ! git diff-index --quiet --cached HEAD; then
            git commit -m "chore: Update version to ${{ github.event.inputs.version }} and migration metadata"
            git push -u origin "release/${{ github.event.inputs.version }}"
          fi

  # ---------------------------------------------------------------------------
  # 2a. GENERATE SCREENSHOTS — runs in parallel with generate_videos.
  #     Produces docs/screenshots/ and docs/manifest.json as a CI artifact;
  #     does NOT commit anything (assemble_docs handles the single commit).
  # ---------------------------------------------------------------------------
  generate_screenshots:
    needs: setup_release
    if: needs.setup_release.outputs.is_patch != 'true'
    runs-on: ubuntu-latest
    env:
      HEADLESS: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: release/${{ github.event.inputs.version }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Generate screenshots and manifest
        run: mvn -B spotless:apply verify -Pgenerate-docs -Dheadless=true

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-screenshots
          if-no-files-found: error
          path: |
            docs/screenshots
            docs/manifest.json

  # ---------------------------------------------------------------------------
  # 2b. GENERATE VIDEOS — runs in parallel with generate_screenshots.
  #     Produces docs/videos/ and docs/video-manifest.json as a CI artifact.
  # ---------------------------------------------------------------------------
  generate_videos:
    needs: setup_release
    if: needs.setup_release.outputs.is_patch != 'true'
    runs-on: ubuntu-latest
    env:
      HEADLESS: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: release/${{ github.event.inputs.version }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Install ffmpeg (required for video generation)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Generate videos
        run: mvn -B spotless:apply verify -Pgenerate-videos -Dheadless=true

      - name: Upload videos artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-videos
          if-no-files-found: error
          path: |
            docs/videos
            docs/video-manifest.json

  # ---------------------------------------------------------------------------
  # 3. ASSEMBLE DOCS — waits for both parallel jobs, downloads their artifacts,
  #    builds the embedded docs site and GitHub Pages, then makes one combined
  #    docs commit.  Uploads the Pages artifact for deploy_pages.
  # ---------------------------------------------------------------------------
  assemble_docs:
    needs: [setup_release, generate_screenshots, generate_videos]
    # Run when setup succeeded and neither docs job failed (skipped = patch release, which is fine).
    if: |
      always() &&
      needs.setup_release.result == 'success' &&
      needs.generate_screenshots.result != 'failure' &&
      needs.generate_videos.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: release/${{ github.event.inputs.version }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install root and docs dependencies
        run: |
          npm install --legacy-peer-deps
          cd docs/site && npm install

      - name: Download screenshots artifact
        if: needs.generate_screenshots.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: docs-screenshots
          path: docs

      - name: Download videos artifact
        if: needs.generate_videos.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: docs-videos
          path: docs

      - name: Build and embed documentation site
        run: node scripts/generate-docs.cjs
        env:
          # Videos are not committed to git (too large). Both the in-app embedded
          # docs and the GitHub Pages site reference videos via this absolute URL
          # so they work in all packaged artifacts without shipping the mp4 files.
          GITHUB_PAGES_BASE: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

      - name: Build documentation for GitHub Pages
        run: |
          cd docs/site
          npm run docs:build
        env:
          BASE_URL: /${{ github.event.repository.name }}/

      - name: Format
        run: mvn spotless:apply

      - name: Commit and Push documentation changes
        run: |
          git add .
          if ! git diff-index --quiet --cached HEAD; then
            git commit -m "docs: Regenerate Game Guide for v${{ github.event.inputs.version }}"
            git push -u origin "release/${{ github.event.inputs.version }}"
          fi

      - name: Upload Docs Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/site/.vitepress/dist

  # ---------------------------------------------------------------------------
  # Everything below this line is unchanged in structure; only
  # build_and_release.needs changes from prepare_release → assemble_docs.
  # ---------------------------------------------------------------------------

  build_and_release:
    needs: assemble_docs
    if: always() && needs.assemble_docs.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: release/${{ github.event.inputs.version }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Build JAR with Maven
        run: mvn -B package -DskipTests --file pom.xml

      - name: Build WAR with Maven
        run: mvn -B war:war -Pwar -DskipTests --file pom.xml

      - name: Build Portable ZIP
        run: mvn -B package -Pportable -DskipTests --file pom.xml

      - name: Create Release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: true
          make_latest: false
          fail_on_unmatched_files: true
          files: |
            ./target/all-time-wrestling-rpg-${{ github.event.inputs.version }}.jar
            ./target/all-time-wrestling-rpg-${{ github.event.inputs.version }}.war
            ./target/all-time-wrestling-rpg-${{ github.event.inputs.version }}.zip

  build_desktop_installers:
    needs: build_and_release
    if: always() && needs.build_and_release.result == 'success'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2025-vs2026]
        include:
          - os: ubuntu-latest
            type: DEB
            icon: src/main/resources/jpackage/linux/icon.png
          - os: macos-latest
            type: DMG
            icon: src/main/resources/jpackage/mac/icon.icns
          - os: windows-2025-vs2026
            type: MSI
            # CI uses a BMP-only ICO to avoid sporadic jpackage UpdateResource failures.
            icon: src/main/resources/jpackage/windows/icon-ci.ico
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: release/${{ github.event.inputs.version }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install WiX Toolset (Windows only)
        if: matrix.os == 'windows-2025-vs2026'
        shell: bash
        run: |
          dotnet tool install --global wix --version 4.0.1
          wix extension add WixToolset.UI.wixext --global

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Build with Maven and JPackage
        shell: bash
        # Override JAVA_TOOL_OPTIONS: the global -Xmx6g is too high for jpackage
        # sub-processes on the 7GB runner. Scoped to -Xmx2g.
        env:
          JAVA_TOOL_OPTIONS: "-Xmx2g"
          MAVEN_OPTS: "-Xmx2g -XX:+UseG1GC"
        run: |
          mvn -B package -Pproduction,desktop \
            -Djpackage.type=${{ matrix.type }} \
            -Djpackage.icon=${{ matrix.icon }} \
            -DskipTests --file pom.xml

      - name: Rename Installers
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          mkdir -p target/dist
          # GitHub automatically replaces spaces with dots in release assets.
          # We rename them here explicitly to match that behavior and ensure our links work.
          find target/dist -name "*.dmg" -exec bash -c 'mv "$1" "target/dist/All.Time.Wrestling-$2.dmg"' _ {} "$VERSION" \;
          find target/dist -name "*.msi" -exec bash -c 'mv "$1" "target/dist/All.Time.Wrestling-$2.msi"' _ {} "$VERSION" \;
          find target/dist -name "*.deb" -exec bash -c 'mv "$1" "target/dist/all-time-wrestling-rpg-$2.deb"' _ {} "$VERSION" \;
          ls -R target/dist

      - name: Upload Installer to Release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.event.inputs.version }}
          fail_on_unmatched_files: true
          files: target/dist/*

  deploy_pages:
    # Pages artifact was uploaded by assemble_docs; the GitHub Release must
    # exist (build_and_release) but we do NOT need to wait for desktop
    # installers — deploying pages in parallel with installer builds saves ~15 min.
    needs: [build_and_release]
    if: always() && needs.build_and_release.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  approve_release:
    needs: [build_desktop_installers, deploy_pages]
    if: |
      always() &&
      needs.build_desktop_installers.result == 'success' &&
      needs.deploy_pages.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: release-approval
    steps:
      - name: Awaiting Manual Approval
        run: echo "Release approved! Proceeding to finalize."

  finalize_release:
    needs: approve_release
    if: always() && needs.approve_release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Mark Release as Final
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if echo "$VERSION" | grep -iqE '\-rc[0-9]*$'; then
            # Release candidate (e.g. 2.0.0-RC1, 2.0.0-RC2): remove prerelease
            # flag so it appears as a normal release, but do NOT mark it latest.
            gh release edit "v${VERSION}" --prerelease=false
          else
            # Final release (e.g. 2.0.0): remove prerelease flag and mark latest.
            gh release edit "v${VERSION}" --prerelease=false --latest
          fi

  build_and_publish_docker:
    needs: finalize_release
    if: always() && needs.finalize_release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: release/${{ github.event.inputs.version }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Build and Publish Docker Image
        run: mvn clean spotless:apply package jib:build -Djib.to.auth.username=${{ secrets.DOCKERHUB_USERNAME }} -Djib.to.auth.password=${{ secrets.DOCKERHUB_TOKEN }} -DskipTests

  merge_to_main:
    needs: build_and_publish_docker
    if: always() && needs.build_and_publish_docker.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge to main
        run: |
          git checkout main
          git fetch origin release/${{ github.event.inputs.version }}
          git merge --squash origin/release/${{ github.event.inputs.version }}
          git commit -m "chore: Merge release ${{ github.event.inputs.version }} back to main"
          git push origin main

      - name: Sync back to source branch
        if: github.ref_name != 'main'
        run: |
          echo "Syncing changes back to source branch: ${{ github.ref_name }}"
          # Fetch the latest remote state of the source branch. The initial
          # checkout in this job is pinned to github.sha, but setup_release
          # pushes additional commits (docs, version bumps) to the branch after
          # the workflow is triggered. Without fetching first, the local branch
          # is behind origin and the subsequent push is rejected non-fast-forward.
          git fetch origin ${{ github.ref_name }}
          git checkout -B ${{ github.ref_name }} origin/${{ github.ref_name }}
          git merge --squash origin/main
          git commit -m "chore: Sync main back to ${{ github.ref_name }} after release ${{ github.event.inputs.version }}"
          git push origin ${{ github.ref_name }}
