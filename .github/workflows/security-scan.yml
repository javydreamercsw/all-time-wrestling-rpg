name: 'Security Scan'

on:
  schedule:
    # Run weekly on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual triggering
  push:
    branches: [ main ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security-scan:
    runs-on: ubuntu-latest
    name: Security Vulnerability Scan
    
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v6

      - name: 'Scan database files for secrets'
        run: |
          SECRET_PATTERNS="AIzaSy|sk-ant-api|sk-proj-|AKIA[0-9A-Z]{16}"
          FOUND=0
          for db_file in $(git ls-files '*.mv.db'); do
            if strings "$db_file" | grep -qE "$SECRET_PATTERNS"; then
              echo "::error file=$db_file::Possible secret found in $db_file"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then exit 1; fi
        
      - name: 'Set up JDK 25'
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          
      - name: 'Cache Maven dependencies'
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
          
      - name: 'Run OWASP Dependency Check'
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -DskipTests \
            -Dformats=HTML,JSON,SARIF
        continue-on-error: true
        
      - name: 'Upload OWASP Dependency Check Report'
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: owasp-dependency-check-report
          path: |
            target/dependency-check-report.html
            target/dependency-check-report.json
            target/dependency-check-report.sarif
          retention-days: 90
          
      - name: 'Upload SARIF results to GitHub Security'
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('target/dependency-check-report.sarif') != ''
        with:
          sarif_file: target/dependency-check-report.sarif
          category: dependency-check
          
      - name: 'Check for high severity vulnerabilities'
        run: |
          if [ -f target/dependency-check-report.json ]; then
            HIGH_VULNS=$(jq '.dependencies[].vulnerabilities[]? | select(.severity == "HIGH" or .severity == "CRITICAL") | .name' target/dependency-check-report.json | wc -l)
            if [ "$HIGH_VULNS" -gt 0 ]; then
              echo "::error::Found $HIGH_VULNS high/critical severity vulnerabilities"
              echo "Please review the dependency check report and update vulnerable dependencies"
              exit 1
            else
              echo "No high/critical severity vulnerabilities found"
            fi
          fi
